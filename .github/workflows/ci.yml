# Runs exactly what a developer runs locally: `make check`. That target is the
# contract -- verify-deps (stdlib-only, no network), gofmt, vet, race tests, and
# a cross-compile smoke -- so CI and local dev cannot drift apart.
#
# Actions are pinned to commit SHAs, not tags. Tags are mutable; for a tool whose
# trust story is an empty go.sum, a hijackable CI action would be the back door
# the rest of the project refuses to have.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # Zero dependencies means nothing to cache, and no cache to poison.
          cache: false

      - run: make check

      # TEMPORARY DIAGNOSTIC — not for merge. Measures whether internal/engine's
      # test time is dominated by deepscan walking /opt and /usr/bin (unconfined
      # by test ScanRoots) vs. git subprocess overhead. Remove before merging.
      - name: diagnostic - per-test timing and system dir sizes
        if: always()
        run: |
          echo "--- /opt and /usr/bin size on this runner ---"
          du -sh /opt /usr/bin 2>/dev/null || true
          echo "--- file counts ---"
          find /opt -type f 2>/dev/null | wc -l
          find /usr/bin -type f 2>/dev/null | wc -l
          echo "--- per-test timing for internal/engine (race) ---"
          go test -race -v ./internal/engine/... 2>&1 | grep -E '^(--- (PASS|FAIL)|=== RUN|ok|FAIL)'
